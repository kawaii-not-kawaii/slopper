name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 for jvmToolchain(17) compilation; JDK 21 (last = JAVA_HOME) runs
      # the Gradle daemon — mirrors local dev.
      - name: Set up JDKs (17 toolchain + 21 runtime)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-

      # Compile-only build gate — no APK assembly/signing in CI (AGP 8.7.3's
      # validateSigningDebug hits an environment-specific BouncyCastle EdEC error
      # on runners). Signed APKs build fine locally; release signing is separate.
      - name: Compile (all modules)
        run: ./gradlew compileDebugSources

      - name: Static analysis (detekt + ktlint)
        run: ./gradlew detekt ktlintCheck

      - name: Unit tests
        run: ./gradlew test
