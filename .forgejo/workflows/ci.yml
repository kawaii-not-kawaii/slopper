name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 for jvmToolchain(17) compilation; JDK 21 (last = JAVA_HOME) runs
      # the Gradle daemon to dodge AGP 8.7.3's validateSigningDebug BouncyCastle
      # EdEC NoClassDefFoundError that only fires on the JDK 17 runtime.
      - name: Set up JDKs (17 toolchain + 21 runtime)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-

      # Pre-create the debug keystore so AGP's validateSigningDebug doesn't hit
      # the BouncyCastle EdEC NoClassDefFoundError when generating one itself.
      - name: Create Android debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -dname "CN=Android Debug,O=Android,C=US" \
            -alias androiddebugkey -keypass android -storepass android \
            -keystore ~/.android/debug.keystore -keyalg RSA -keysize 2048 -validity 10000

      # assembleDebug runs alone: detekt/ktlint's older BouncyCastle would shadow
      # AGP's (with the EdEC class) in a shared JVM and break validateSigningDebug.
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Static analysis (detekt + ktlint)
        run: ./gradlew detekt ktlintCheck

      - name: Unit tests
        run: ./gradlew test
