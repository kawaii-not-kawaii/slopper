name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-

      # Pre-create the debug keystore so AGP's validateSigningDebug doesn't hit
      # the BouncyCastle EdEC NoClassDefFoundError when generating one itself.
      - name: Create Android debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -dname "CN=Android Debug,O=Android,C=US" \
            -alias androiddebugkey -keypass android -storepass android \
            -keystore ~/.android/debug.keystore -keyalg RSA -keysize 2048 -validity 10000

      - name: Build + Lint + Static analysis
        run: ./gradlew assembleDebug detekt ktlintCheck
