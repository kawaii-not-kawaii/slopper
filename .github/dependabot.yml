version: 2
updates:
  # Gradle dependencies — reads the version catalog (gradle/libs.versions.toml)
  # plus any *.gradle.kts build files.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    # No grouping: this project's build couples many deps to the AGP/KSP/Kotlin
    # toolchain and to the deferred compileSdk-36 work, so a grouped PR perpetually
    # fails on whichever blocked dep it bundles. Individual PRs let safe leaf-
    # library updates flow and merge on their own; a blocked dep fails in isolation.
    ignore:
      # Build toolchain (AGP / Gradle / Kotlin / KSP / Hilt) is a tightly
      # version-LOCKSTEP cluster — bumping any one piecemeal breaks the others,
      # so it is managed deliberately (v1.1 DEPS-17 landed AGP 9.2.1 + Gradle
      # 9.4.1 + Kotlin 2.3.20 + KSP 2.3.9 + Hilt 2.59.2 together, 2026-05-31).
      # The lockstep is intrinsic, NOT a temporary block:
      #   - KSP is published against an EXACT Kotlin version (KSP 2.3.9 ⇒ Kotlin
      #     2.3.20); a lone Kotlin patch leaves KSP without a matching build.
      #   - AGP majors set a Gradle floor and remove DSL/extension APIs
      #     (AGP 9.0 removed BaseExtension → legacy kotlin.android crashes; AGP-9
      #     built-in Kotlin requires KSP2 ⇒ Kotlin 2.3.x). See ADR-0001 + the
      #     B-08-0x blocker chain in .planning/STATE.md.
      #   - Dagger/Hilt is KSP-host-coupled (2.59 drops AGP 8 entirely).
      # Keep this cluster excluded; bump it as a deliberate toolchain pass.
      # Leaf libraries (AndroidX activity/core, Media3*, OkHttp, Coil, Apollo,
      # test libs, etc.) flow through Dependabot normally.
      - dependency-name: "com.android.*"          # AGP (gradle/application/library/test)
      - dependency-name: "gradle"                 # Gradle distribution (wrapper)
      - dependency-name: "org.jetbrains.kotlin*"  # Kotlin (KSP version-locked to it)
      - dependency-name: "com.google.devtools.ksp*"
      - dependency-name: "com.google.dagger*"     # Hilt / Dagger (KSP-host-coupled)
      # baseline-profile plugin is PINNED to a pre-release for AGP-9 support
      # (1.5.0-alpha06, accepted-risk AR-08-01 in .planning/STATE.md); the stable
      # line (1.4.1) hard-rejects AGP 9. Keep excluded until a STABLE AGP-9
      # baseline-profile ships, then re-point and drop this ignore.
      - dependency-name: "androidx.benchmark*"
      # Media3 + nextlib-media3ext are a single LOCKED PAIR (PITFALLS §16): a
      # version mismatch causes a runtime UnsatisfiedLinkError. HARD CAP at
      # Media3 1.10.0 — nextlib has no 1.10.1 pairing (1.10.1-0.12.1 = 404).
      # Dependabot cannot bump Media3 alone safely; bump the pair deliberately.
      - dependency-name: "androidx.media3:*"
      - dependency-name: "io.github.anilbeesetti:*"
      # NOTE (2026-05-31, DEPS-17): androidx.activity (→1.13.0) and androidx.core
      # / core-ktx (→1.18.0) were UN-IGNORED here — their AGP-8.9.1 / compileSdk-36
      # floor is now satisfied by the AGP-9 landing, so Dependabot manages them
      # as normal leaf libraries again.

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
