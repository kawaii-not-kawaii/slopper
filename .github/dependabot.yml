version: 2
updates:
  # Gradle dependencies — reads the version catalog (gradle/libs.versions.toml)
  # plus any *.gradle.kts build files.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut review noise.
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # AGP 9 / compileSdk 36 and the matching Gradle 9 bump are deferred
      # (DEPS-17, blocked on Hilt AGP-9 support). Wildcard covers every AGP
      # artifact Dependabot tracks: com.android.tools.build:gradle,
      # com.android.application, com.android.library, com.android.test.
      - dependency-name: "com.android.*"
        update-types: ["version-update:semver-major"]
      # Gradle distribution (wrapper) — major bump pairs with AGP 9, deferred.
      - dependency-name: "gradle"
        update-types: ["version-update:semver-major"]

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
