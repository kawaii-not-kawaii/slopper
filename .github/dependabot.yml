version: 2
updates:
  # Gradle dependencies — reads the version catalog (gradle/libs.versions.toml)
  # plus any *.gradle.kts build files.
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut review noise.
      gradle-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Build toolchain (AGP / Gradle / Kotlin / KSP) is tightly version-locked
      # and must be bumped together in a deliberate DEPS pass — never piecemeal
      # by Dependabot. Each broke CI when bumped alone:
      #   - AGP 8.13.2 requires Gradle 8.13 (project is on 8.11.1)
      #   - KSP 2.3.9 requires Kotlin 2.3; KSP is pinned to the EXACT Kotlin
      #     version (PITFALLS §3), so even a Kotlin patch breaks the lockstep
      #   - AGP 9 / compileSdk 36 / Gradle 9 are deferred (DEPS-17, Hilt-blocked)
      # Exclude all update types for the whole cluster. Dependabot still handles
      # leaf libraries (AndroidX, OkHttp, Coil, Apollo, test libs, etc.).
      - dependency-name: "com.android.*"          # AGP (gradle/application/library/test)
      - dependency-name: "gradle"                 # Gradle distribution (wrapper)
      - dependency-name: "org.jetbrains.kotlin*"  # Kotlin (KSP version-locked to it)
      - dependency-name: "com.google.devtools.ksp*"
      # Coupled build plugins — version-tied to the AGP/KSP/Kotlin toolchain;
      # minor bumps fail plugin application (e.g. Hilt). Manage with the toolchain.
      - dependency-name: "com.google.dagger*"          # Hilt / Dagger (KSP-coupled)
      - dependency-name: "androidx.benchmark*"         # baseline-profile plugin (AGP-coupled)

  # Keep the GitHub Actions used in workflows up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(ci)"
