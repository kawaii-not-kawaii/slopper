name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-

      # AGP's :app:validateSigningDebug auto-generates ~/.android/debug.keystore on
      # a fresh runner, and that codepath hits a BouncyCastle EdEC NoClassDefFoundError.
      # Pre-create the standard RSA debug keystore so AGP reuses it instead.
      - name: Create Android debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -dname "CN=Android Debug,O=Android,C=US" \
            -alias androiddebugkey -keypass android -storepass android \
            -keystore ~/.android/debug.keystore -keyalg RSA -keysize 2048 -validity 10000

      - name: Build + Lint + Static analysis
        run: ./gradlew assembleDebug detekt ktlintCheck --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          retention-days: 7
          if-no-files-found: ignore
