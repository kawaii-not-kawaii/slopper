name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # JDK 17 satisfies jvmToolchain(17) for compilation; JDK 21 (listed last,
      # so it becomes JAVA_HOME) runs the Gradle daemon — mirrors local dev.
      - name: Set up JDKs (17 toolchain + 21 runtime)
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp8-

      # Compile every module (incl. resource/manifest processing) as the build-
      # breakage gate. We intentionally do NOT assemble/sign an APK in CI: AGP
      # 8.7.3's :app:validateSigningDebug hits an environment-specific BouncyCastle
      # EdEC NoClassDefFoundError on the runners. Signed APKs build fine locally;
      # a dedicated release workflow (with signing secrets) can handle that later.
      - name: Compile (all modules)
        run: ./gradlew compileDebugSources --no-daemon --stacktrace

      - name: Static analysis (detekt + ktlint)
        run: ./gradlew detekt ktlintCheck --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          retention-days: 7
          if-no-files-found: ignore
