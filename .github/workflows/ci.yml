name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Verify the checked-in gradle-wrapper.jar matches a known-good Gradle
      # release (supply-chain integrity; also exempts the jar from Scorecard's
      # Binary-Artifacts check).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@48b5f213c81028ace310571dc5ec0fbbca0b2947 # v4

      # JDK 17 satisfies jvmToolchain(17) for compilation; JDK 21 (listed last,
      # so it becomes JAVA_HOME) runs the Gradle daemon — mirrors local dev.
      - name: Set up JDKs (17 toolchain + 21 runtime)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Cache Gradle
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp9-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            gradle-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}-jdk17-agp9-

      # Compile every module (incl. resource/manifest processing) as the build-
      # breakage gate. We intentionally do NOT assemble/sign an APK in CI:
      # :app:validateSigningDebug hits an environment-specific BouncyCastle EdEC
      # NoClassDefFoundError on the runners (re-evaluated in Phase 10). Signed
      # APKs build fine locally; a dedicated release workflow can handle that.
      - name: Compile (all modules)
        run: ./gradlew compileDebugSources --no-daemon --stacktrace

      - name: Static analysis (detekt + ktlint)
        run: ./gradlew detekt ktlintCheck --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace

      # Phase 10 CI-SIGNING: non-gating assembleDebug probe to re-evaluate the
      # BouncyCastle EdEC blocker under AGP 9. If this passes, a real
      # assemble/signing gate can be promoted. If it fails, the compile-only
      # gate remains the contract.
      - name: "Probe: assembleDebug (non-gating)"
        continue-on-error: true
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            **/build/reports/tests/
            **/build/reports/detekt/
          retention-days: 7
          if-no-files-found: ignore
