# CodeQL static analysis (SAST) for the Kotlin/Java sources.
# Results land in Security -> Code scanning. Actions pinned by SHA.
name: CodeQL

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '41 3 * * 1' # weekly, Monday 03:41 UTC

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    permissions:
      security-events: write # upload CodeQL results
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # JDK 17 toolchain + 21 daemon — mirrors ci.yml so the manual build matches.
      - name: Set up JDKs (17 toolchain + 21 runtime)
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: 'temurin'
          java-version: |
            17
            21

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v3
        with:
          languages: java-kotlin
          build-mode: manual

      # Compile every module so CodeQL traces the Kotlin/Java sources. The
      # Android SDK is preinstalled on ubuntu-latest (ANDROID_SDK_ROOT set);
      # AGP picks it up exactly as the CI build does.
      - name: Build (compile all modules)
        run: ./gradlew compileDebugSources --no-daemon --stacktrace

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v3
        with:
          category: "/language:java-kotlin"
