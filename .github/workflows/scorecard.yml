# OpenSSF Scorecard — supply-chain security health checks.
# https://github.com/ossf/scorecard  |  publishes to https://api.securityscorecards.dev
# for the score/badge. SARIF is NOT uploaded to code scanning (the governance
# checks are not code bugs and were cluttering the Security tab).
# Actions are pinned by commit SHA (Scorecard's Pinned-Dependencies check).
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    - cron: '26 2 * * 1' # weekly, Monday 02:26 UTC
  push:
    branches: [ master ]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    # Only run on the default branch (or PRs); skips fork/feature pushes.
    if: github.event.repository.default_branch == github.ref_name || github.event_name == 'pull_request'
    permissions:
      id-token: write # publish_results -> OpenSSF API (badge)

    steps:
      - name: "Checkout code"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@f49aabe0b5af0936a0987cfb85d86b75731b0186 # v2.4.1
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
