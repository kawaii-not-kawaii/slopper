# Project detekt config — loosens a few rules that conflict with Compose
# idioms and keeps the focus on real quality issues.
#
# detekt 2.0 (dev.detekt): the legacy `build: maxIssues:` key was removed —
# gate severity is now driven by the Gradle extension `failOnSeverity` (default
# Error) + `ignoreFailures=false`. Rule sections below are unchanged.

complexity:
  LongMethod:
    threshold: 150          # Compose screens routinely hit 100+ lines
  LongParameterList:
    functionThreshold: 12   # Compose components with lots of slots
    constructorThreshold: 12
  TooManyFunctions:
    # detekt 1.23.8 renamed thresholdInFile→thresholdInFiles and thresholdInClass→thresholdInClasses
    thresholdInFiles: 30
    thresholdInClasses: 20
  CyclomaticComplexMethod:
    threshold: 20
  LargeClass:
    threshold: 800

naming:
  FunctionNaming:
    # Allow PascalCase for @Composable functions (idiomatic).
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*|[a-z][A-Za-z0-9]*'

style:
  MagicNumber:
    active: false           # Noisy in Compose layout code
  ReturnCount:
    max: 5
  ForbiddenComment:
    active: true
    # detekt 1.23.8 deprecated `values:` in favour of structured `comments:` list.
    comments:
      - reason: 'Forbidden FIXME marker in production code'
        value: 'FIXME:'
      - reason: 'STOPSHIP marker must be resolved before shipping'
        value: 'STOPSHIP:'
  MaxLineLength:
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true

potential-bugs:
  UnsafeCast:
    active: true
  LateinitUsage:
    active: false           # Hilt injection uses lateinit

performance:
  SpreadOperator:
    active: true
